kind = "web"
previewPath = "/"
title = "IT System Solutions"
version = "1.0.0"
id = "artifacts/it-solutions"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25380
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/it-solutions run dev"

[services.env]
PORT = "25380"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/it-solutions", "run", "build"]
publicDir = "artifacts/it-solutions/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
